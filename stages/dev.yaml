# Development stage resources.
# Reduced profile for developer workstations; heavy and medium services are about half-size.
services:
  camunda-data-init:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  orchestration:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
          cpus: "0.5"
          memory: 2048M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms3072m -Xmx3072m"

  elasticsearch:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 2048M
        reservations:
          cpus: "0.25"
          memory: 1536M
    environment:
      - "ES_JAVA_OPTS=-Xms1024m -Xmx1024m"

  optimize:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1536M
        reservations:
          cpus: "0.25"
          memory: 768M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms1152m -Xmx1152m"

  keycloak:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 256M

  connectors:
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 256M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms384m -Xmx384m"

  identity:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 256M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms384m -Xmx384m"

  web-modeler-restapi:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 256M
    environment:
      JAVA_OPTIONS: "-Xmx384m"

  postgres:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 256M

  camunda-db:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 512M

  web-modeler-db:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 128M

  console:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 256M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms384m -Xmx384m"

  web-modeler-websockets:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  mailpit:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  reverse-proxy:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
