# Development stage resources.
# Reduced profile for developer workstations; heavy and medium services are about half-size.
services:
  orchestration:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
          cpus: "0.5"
          memory: 2048M

  elasticsearch:
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 4096M
        reservations:
