# Test stage resources.
# Compact profile for constrained test hosts; heavy and medium services are reduced further.
services:
  camunda-data-init:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  orchestration:
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 3072M
        reservations:
          cpus: "0.25"
          memory: 1536M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms2304m -Xmx2304m"

  elasticsearch:
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 3072M
        reservations:
          cpus: "0.25"
          memory: 2048M
    environment:
      - "ES_JAVA_OPTS=-Xms1536m -Xmx1536m"

  optimize:
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 1024M
        reservations:
          cpus: "0.25"
          memory: 512M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms768m -Xmx768m"

  keycloak:
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 256M

  connectors:
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 384M
        reservations:
          cpus: "0.1"
          memory: 192M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx256m"

  identity:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.125"
          memory: 192M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms256m -Xmx256m"

  web-modeler-restapi:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 384M
        reservations:
          cpus: "0.125"
          memory: 192M
    environment:
      JAVA_OPTIONS: "-Xmx256m"

  postgres:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 256M

  camunda-db:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M

  web-modeler-db:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
        reservations:
          cpus: "0.05"
          memory: 128M

  console:
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
        reservations:
          cpus: "0.125"
          memory: 256M
    environment:
      JAVA_TOOL_OPTIONS: "-Xms384m -Xmx384m"

  web-modeler-websockets:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  mailpit:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M

  reverse-proxy:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.05"
          memory: 32M
