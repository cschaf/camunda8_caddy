spring:
  profiles:
    active: "identity,operate,tasklist,broker,consolidated-auth"

management:
  server:
    port: 9600
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,configprops
  endpoint:
    configprops:
      show-values: ALWAYS

server:
  forward-headers-strategy: framework
  address: 0.0.0.0

zeebe:
  host: 0.0.0.0
  log:
    level: "info"

  broker:
    # zeebe.broker.gateway
    gateway:
      enable: true
      network:
        host: 0.0.0.0
        port: 26500

    # zeebe.broker.network
    network:
      host: 0.0.0.0
      commandApi:
        port: 26501
      internalApi:
        port: 26502

    # zeebe.broker.data
    data:
      snapshotPeriod: 5m
      # Allow running with low disk space (for local development)
      diskUsageCommandWatermark: 0.85
      diskUsageReplicationWatermark: 0.90
      freeSpace:
        processing: 2GB
        replication: 3GB

    # zeebe.broker.threads
    threads:
      cpuThreadCount: "4"
      ioThreadCount: "4"

    # zeebe.broker.exporters
    exporters:
      elasticsearch:
        className: "io.camunda.zeebe.exporter.ElasticsearchExporter"
        args:
          url: "http://elasticsearch:9200"
          # Default is 1000; batching avoids excessive Lucene segment churn.
          # A value of 1 would write every event individually, causing rapid index growth.
          bulk:
            size: 1000
          index:
            prefix: "zeebe-record"
            numberOfShards: 1
          retention:
            enabled: true
            minimumAge: 30d
            policyName: zeebe-record-retention-policy
      CamundaExporter:
        className: "io.camunda.exporter.CamundaExporter"
        args:
          connect:
            type: elasticsearch
            url: "http://elasticsearch:9200"
          createSchema: true
          index:
            numberOfShards: 1
            numberOfReplicas: 0
          history:
            retention:
              enabled: true
              minimumAge: 30d
              policyName: camunda-retention-policy

camunda:
  persistent:
    sessions:
      enabled: true

  rest:
    query:
      enabled: true

  security:
    authentication:
      method: "oidc"
      unprotectedApi: false
    authorizations:
      enabled: true
    initialization:
      defaultRoles:
        admin:
          users:
            - demo
          clients:
            - orchestration
        connectors:
          users:
            - connectors
          clients:
            - connectors

  database:
    index:
      numberOfReplicas: 0
  data:
    secondary-storage:
      type: elasticsearch
      elasticsearch:
        url: "http://elasticsearch:9200"

  operate:
    persistentSessionsEnabled: true
    identity:
      redirectRootUrl: "https://orchestration.${HOST}/operate"
    archiver:
      ilmEnabled: true
      ilmMinAgeForDeleteArchivedIndices: 30d

  tasklist:
    identity:
      redirectRootUrl: "https://orchestration.${HOST}/tasklist"
    archiver:
      ilmEnabled: true
      ilmMinAgeForDeleteArchivedIndices: 30d

