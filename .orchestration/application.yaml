spring:
  profiles:
    active: "admin,operate,tasklist,broker,consolidated-auth"

management:
  server:
    port: 9600
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus

server:
  forward-headers-strategy: framework
  address: 0.0.0.0

zeebe:
  host: 0.0.0.0
  log:
    level: "info"

  broker:
    gateway:
      enable: true

camunda:
  api:
    grpc:
      address: 0.0.0.0
      port: 26500
  cluster:
    network:
      host: 0.0.0.0
      command-api:
        port: 26501
      internal-api:
        port: 26502
  system:
    cpu-thread-count: 4
    io-thread-count: 4
  data:
    primary-storage:
      directory: /usr/local/camunda/data
      snapshot-period: 5m
      disk:
        free-space:
          processing: 2GB
          replication: 1GB
    secondary-storage:
      type: rdbms
      rdbms:
        url: "jdbc:postgresql://camunda-db:5432/camunda"
        username: "camunda"
        password: "${CAMUNDA_DB_PASSWORD}"
    exporters:
      elasticsearch:
        class-name: io.camunda.zeebe.exporter.ElasticsearchExporter
        args:
          url: "http://elasticsearch:9200"
          authentication:
            username: "elastic"
            password: "${ELASTIC_PASSWORD}"
          bulk:
            delay: 5
            size: 1000
            memory-limit: 10485760
          retention:
            enabled: true
            minimum-age: 90d
            policy-name: zeebe-records-retention-policy
          index:
            prefix: zeebe-record
            create-template: true
            index-suffix-date-pattern: "yyyy-MM-dd"
            number-of-shards: 1
            number-of-replicas: 0
            optimize-mode-enabled: true
  database:
    elasticsearch:
      url: "http://elasticsearch:9200"
      username: "elastic"
      password: "${ELASTIC_PASSWORD}"
  backup:
    webapps:
      enabled: false
  persistent:
    sessions:
      enabled: true

  rest:
    query:
      enabled: true

  mcp:
    # Camunda 8.9 built-in Orchestration Cluster MCP server. Docker Compose
    # enables this by default upstream, but keeping it explicit documents that
    # AI/MCP clients may use /mcp/cluster through localhost:8088 or Caddy.
    enabled: true

  security:
    authentication:
      method: "oidc"
      unprotectedApi: false
    authorizations:
      enabled: true
    initialization:
      defaultRoles:
        admin:
          users:
            - demo
          clients:
            - orchestration
        connectors:
          users:
            - connectors
          clients:
            - connectors

  operate:
    persistentSessionsEnabled: true
    identity:
      redirectRootUrl: "https://orchestration.${HOST}/operate"

  tasklist:
    identity:
      redirectRootUrl: "https://orchestration.${HOST}/tasklist"
