spring:
  profiles:
    active: "admin,operate,tasklist,broker,consolidated-auth"

  datasource:
    url: jdbc:postgresql://camunda-db:5432/camunda
    username: camunda
    password: ${CAMUNDA_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

management:
  server:
    port: 9600
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,configprops
  endpoint:
    configprops:
      show-values: ALWAYS

server:
  forward-headers-strategy: framework
  address: 0.0.0.0

zeebe:
  host: 0.0.0.0
  log:
    level: "info"

  broker:
    # zeebe.broker.gateway
    gateway:
      enable: true
      network:
        host: 0.0.0.0
        port: 26500

    # zeebe.broker.network
    network:
      host: 0.0.0.0
      commandApi:
        port: 26501
      internalApi:
        port: 26502

    # zeebe.broker.data
    data:
      directory: /usr/local/camunda/data
      snapshotPeriod: 5m
      # Allow running with low disk space (for local development)
      diskUsageCommandWatermark: 0.85
      diskUsageReplicationWatermark: 0.90
      freeSpace:
        processing: 2GB
        replication: 3GB

    # zeebe.broker.threads
    threads:
      cpuThreadCount: "4"
      ioThreadCount: "4"

    # zeebe.broker.exporters
    exporters:
      camunda:
        className: "io.camunda.exporter.CamundaExporter"
        args:
          connect:
            type: rdbms
            url: "jdbc:postgresql://camunda-db:5432/camunda"
            username: "camunda"
            password: "${CAMUNDA_DB_PASSWORD}"
          index:
            prefix: "camunda-record"
          retention:
            enabled: true
            minimumAge: 90d
            policyName: camunda-record-retention-policy

camunda:
  database:
    type: rdbms
    index:
      numberOfReplicas: 0
  backup:
    webapps:
      enabled: false
  persistent:
    sessions:
      enabled: true

  rest:
    query:
      enabled: true

  mcp:
    enabled: true

  security:
    authentication:
      method: "oidc"
      unprotectedApi: false
    authorizations:
      enabled: true
    initialization:
      defaultRoles:
        admin:
          users:
            - demo
          clients:
            - orchestration
        connectors:
          users:
            - connectors
          clients:
            - connectors

  operate:
    persistentSessionsEnabled: true
    identity:
      redirectRootUrl: "https://orchestration.${HOST}/operate"
    archiver:
      ilmEnabled: true
      ilmMinAgeForDeleteArchivedIndices: 90d

  tasklist:
    identity:
      redirectRootUrl: "https://orchestration.${HOST}/tasklist"
    archiver:
      ilmEnabled: true
      ilmMinAgeForDeleteArchivedIndices: 90d
